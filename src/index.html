<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多页签笔记应用</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.11.2/dist/index.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 -->
        <aside class="left-sidebar">
            <div class="sidebar-nav">
                <!-- 导航图标会动态渲染 -->
            </div>
            <div class="sidebar-content">
                <!-- 内容面板会在这里渲染 -->
            </div>
        </aside>

        <!-- 拉伸条 -->
        <div class="resize-handle" id="resizeHandle"></div>

        <!-- 右侧主容器 -->
        <div class="main-container">
            <!-- 顶部导航栏 -->
            <header class="header">
                <div class="tab-bar" id="tabBar">
                    <!-- 固定主页标签页 -->
                    <div class="tab active" data-tab-id="home">
                        <div class="tab-icon-title">
                            <i class="fas fa-home"></i>
                            <span class="tab-title">首页</span>
                        </div>
                    </div>
                    <!-- 动态笔记标签页会在这里添加 -->
                </div>

                <div class="header-actions">
                    <button class="btn-new-note" id="newNoteBtn">
                        <i class="fas fa-plus"></i> 新建笔记
                    </button>
                </div>
            </header>

            <!-- 内容区域 -->
            <main class="main-content">
                <!-- 首页（始终显示） -->
                <div class="tab-content active" id="tab-home">
                    <div class="home-container">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text"
                                   id="searchInput"
                                   placeholder="搜索笔记内容或标题...">
                            <button class="btn-search">
                                <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>

                        <div class="all-notes">
                            <h2><i class="fas fa-sticky-note"></i> 所有笔记</h2>
                            <div class="notes-grid" id="notesGrid">
                                <!-- 所有笔记会动态加载到这里 -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 笔记编辑页面容器 -->
                <div class="notes-container" id="notesContainer">
                    <!-- 笔记编辑器会动态添加到这里 -->
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vditor@3.11.2/dist/index.min.js"></script>
    <script type="module" src="./renderer.js"></script>
</body>
</html>
